name: PluginGuard
version: '${version}'
main: io.github.darkstarworks.PluginGuard
api-version: '1.21'
load: STARTUP
prefix: PG »
folia-supported: true
description: Lightweight plugin to hide installed plugins from users
author: darkstarworks
authors: [ darkstarworks ]
website: https://github.com/ESMP-FUN/PluginGuard

commands:
  pluginguard:
    description: PluginGuard admin command
    usage: /pluginguard <reload|status|update>
    aliases: [pg]
    permission: pluginguard.reload

permissions:
  pluginguard.bypass:
    description: Users with this permission bypass plugin hiding and see the real plugin list
    default: op
  pluginguard.reload:
    description: Reloads the PluginGuard configuration
    default: op
  pluginguard.alerts:
    description: Receive in-game notifications when a player trips the probe detector
    default: op
