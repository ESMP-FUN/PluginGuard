# PluginPulse updater configuration.
# https://github.com/ESMP-FUN/PluginPulse
#
# Modrinth is the primary source; GitHub Releases is the fallback.
modrinth: pluginguard
github: darkstarworks/PluginGuard

permission: pluginguard.reload
command-root: /pluginguard
user-agent-contact: https://github.com/ESMP-FUN/PluginGuard
prefix: "<gold>[PluginGuard]</gold>"

# off | check-only | notify | download | auto-stage
# Server owners can override this (and check-interval-hours) from an
# `update:` section in PluginGuard's own config.yml.
mode: notify
check-interval-hours: 6

# PluginGuard ships a separate "-mc26" build for Minecraft 26.x; servers on
# 26.x follow that release line automatically.
track: mc26
