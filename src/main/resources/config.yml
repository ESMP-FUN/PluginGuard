# PluginGuard Configuration - Comprehensive Plugin Protection
# Protect your server by hiding installed plugins from users
#
# Author: darkstarworks | https://github.com/darkstarworks
# Donate: https://ko-fi.com/darkstarworks
#
# ===== BASIC SETTINGS =====
#
# Hide Mode Options:
# - "unknown-command": Shows "Unknown command" message (most realistic)
# - "empty": Shows "Plugins (0):"
# - "fake-list": Shows configured fake plugins below
# - "permission-denied": Shows permission error message
hide-mode: "unknown-command"

# Fake plugins to display when hide-mode is "fake-list"
# Use vanilla-sounding names to appear legitimate
fake-plugins:
  - "ServerCore"
  - "WorldManager"
  - "CoreProtect"
  - "EveryoneChat"

# Permission node to bypass all plugin hiding (staff/admin only)
bypass-permission: "pluginguard.bypass"

# ===== COMMAND PROTECTION =====

# Commands to intercept and hide (supports bukkit: and minecraft: prefixes)
protected-commands:
  - "pl"
  - "plugins"
  - "ver"
  - "version"
  - "?"
  - "help"
  - "about"
  - "icanhasbukkit"

# Block all bukkit: and minecraft: prefixed commands (prevents probing)
block-bukkit-commands: true

# Block ALL namespaced commands (e.g. /essentials:home, /luckperms:lp).
# The namespace before the colon is the plugin's name, so a single namespaced
# command confirms a plugin exists even when its bare alias is hidden.
# Also strips namespaced entries from tab completion.
block-namespaced-commands: true

# Redirect bukkit: commands to show spoofed list instead of blocking
# Only works if block-bukkit-commands is true
redirect-bukkit-commands: false

# ===== TAB COMPLETION PROTECTION =====

# Remove plugin commands from tab-completion suggestions
# Prevents discovery through /[tab] probing
hide-tab-completion: true

# ===== ADVANCED PROTECTION =====

# Hide permission-gated plugin commands behind "Unknown command"
# When a player runs a plugin command they lack permission for, the plugin's own
# "You don't have permission" reply would confirm the plugin exists. This option
# answers with the vanilla unknown-command line instead, before the plugin responds.
# (Only works for commands that declare a permission in their plugin.yml.)
block-unknown-commands: true

# Common plugin commands to block (case-insensitive)
# Add popular plugin commands that users might probe for
common-plugin-commands:
  - "essentials"
  - "ess"
  - "worldedit"
  - "we"
  - "luckperms"
  - "lp"
  - "coreprotect"
  - "co"
  - "vault"
  - "multiverse"
  - "mv"
  - "citizens"
  - "npc"
  - "clearlag"
  - "dynmap"
  - "griefprevention"
  - "gp"
  - "holographicdisplays"
  - "hd"

# Block common plugin commands from the list above
block-common-plugin-commands: true

# ===== SERVER METADATA PROTECTION =====

# Hide server software everywhere it leaks over the protocol:
#  - the server-list ping / MOTD screen, AND
#  - the in-game "minecraft:brand" channel that the F3 debug screen and
#    "server brand" client mods read after a player joins.
# Most plugins only cover the ping; PluginGuard spoofs both to the value below.
# (In-game spoofing needs Paper internals; on Spigot it degrades to ping-only.)
hide-server-brand: true

# Fake server brand to display (e.g., "vanilla", "1.21.1", "custom")
fake-server-brand: "vanilla"

# ===== AGGRESSIVE MODE =====

# AGGRESSIVE MODE: Block ALL plugin commands for players without explicit permission
# WARNING: This will hide even beneficial plugin commands for regular players
# Use only if you want maximum security and manually grant command permissions
# Requires players to have "<command>.use" permission to use any plugin command
aggressive-mode: false

# ===== PROBE LOGGING & DETECTION =====
#
# PluginGuard can record when players try to discover what plugins you run,
# and alert online admins when a player shows a pattern of probing behavior.
#
# Players with "pluginguard.bypass" are never tracked.

logging:
  # Append every probe attempt to plugins/PluginGuard/probes.log (one line per event).
  # Disabled by default — enable if you want a forensic trail.
  log-to-file: false

  # Also log every individual probe to the server console.
  # Noisy on busy servers; off by default. The detector still logs its alerts to console.
  log-individual-probes: false

  detection:
    # Master switch for pattern detection and admin alerts.
    enabled: true

    # Weighted score within window-seconds that triggers an alert.
    # Probe weights:
    #   high   (3) — bukkit:/minecraft: prefixed commands, /icanhasbukkit
    #   medium (2) — /pl, /plugins, /ver, /version, /about
    #   low    (1) — common-plugin enumeration (/lp, /we, /co, /mv, ...)
    #   honeypot (5) — see honeypot-commands below (single hit fires immediately)
    # /help and /? are never tracked because legitimate players use them constantly.
    score-threshold: 5
    window-seconds: 60

    # Minimum seconds between alerts for the same player. Prevents alert spam
    # from a determined prober.
    alert-cooldown-seconds: 300

    # Online players with this permission receive a chat notification on each alert.
    # Console always logs the alert regardless.
    notify-permission: "pluginguard.alerts"

# Honeypot commands — fake commands that no legitimate user should ever type.
# When a player types any of these, PluginGuard blocks the command AND records
# a high-weight probe (single hit = immediate alert at the default threshold).
#
# Example honeypots: invent commands that sound plausible to an attacker but
# don't actually exist on your server.
honeypot-commands:
  - "staffchat"
  - "adminchat"
  - "modchat"
  - "opme"