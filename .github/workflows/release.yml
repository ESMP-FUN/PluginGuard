name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: |
            25
            21

      - uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_21_X64 }}

      - name: Extract changelog section
        run: |
          awk '/^## \[/{n++} n==1' CHANGELOG.md > RELEASE_NOTES.md || echo "See CHANGELOG.md" > RELEASE_NOTES.md

      - name: Create release
        run: gh release create "$GITHUB_REF_NAME" build/libs/PluginGuard-*.jar --title "$GITHUB_REF_NAME" --notes-file RELEASE_NOTES.md
        env:
          GH_TOKEN: ${{ github.token }}

      # mc26 companion jar — built from the mc26 branch (merge main -> mc26 before tagging)
      - name: Build and attach mc26 jar
        run: |
          if git fetch origin mc26 2>/dev/null; then
            git checkout -f FETCH_HEAD
            JAVA_HOME="$JAVA_HOME_25_X64" ./gradlew build -x test
            gh release upload "$GITHUB_REF_NAME" build/libs/*-mc26.jar || echo "no mc26 jar produced"
          else
            echo "no mc26 branch — skipping"
          fi
        env:
          GH_TOKEN: ${{ github.token }}
